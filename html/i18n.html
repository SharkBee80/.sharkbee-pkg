<!DOCTYPE html>
<html>

<head>
	<meta charset='utf-8'>
	<meta http-equiv='X-UA-Compatible' content='IE=edge'>
	<title>Page Title</title>
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<style>
		h1 {
			text-align: center;
		}

		#list {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			/* 核心：每行三列 */

			/* 外框设计 */
			border: 2px solid #333;
			/* 整体粗外边框 */
			background-color: #333;
			/* 设置为边框颜色 */
			gap: 1px;
			/* 单元格之间的缝隙，形成内边框线 */

			/* 其他容器属性 */
			border-radius: 8px;
			/* 圆角 */
			/* 确保内容不溢出圆角 */
			margin: 20px 0;
			height: 85dvh;
			overflow: auto;
		}

		#list div {
			background-color: #fff;
			/* 必须设置背景色，否则会透出容器的深色背景 */
			padding: 12px 15px;
			font-size: 14px;
			display: flex;
			align-items: center;
			/* 单元格内容垂直居中 */
		}

		#list div:hover {
			background-color: yellow !important;
		}

		#list div:nth-child(-n+3) {
			background-color: #dedede;
			font-weight: bolder;
			position: sticky;
			/* 可选：让表头在滚动时固定 */
			top: 0;
			z-index: 1;
		}

		#list div:nth-child(6n+7),
		#list div:nth-child(6n+8),
		#list div:nth-child(6n+9) {
			background-color: rgba(255, 255, 0, 0.8);
			/* 偶数行底色 */
		}

		.space {
			height: 20px;
		}

		.hover:hover {
			background-color: greenyellow !important;
			color: red;
			cursor: pointer;
		}
	</style>
</head>

<body>
	<h1>i18n</h1>
	<div id="list">
		<div>语言代码</div>
		<div>语言名称</div>
		<div id="unified">语言名称(统一)</div>
	</div>
	<div class="space"></div>
</body>
<script>
	let uniqueCode = null;

	const getLanguageSelfNames = (localeCode) => {
		const langName = new Intl.DisplayNames([localeCode, 'en-US'], { type: 'language' });
		return langName.of(localeCode);
	};

	const getLanguageUniqueNames = (localeCode, uniqueCode = 'en-US') => {
		const langName = new Intl.DisplayNames([uniqueCode, 'en-US'], { type: 'language', });
		return langName.of(localeCode);
	};

	const shortCode = ['ar', 'az', 'be', 'bg', 'ca', 'cs', 'cy', 'da', 'de', 'dv', 'el', 'en', 'eo', 'es', 'et', 'eu', 'fa', 'fi', 'fo', 'fr', 'gl', 'gu', 'he', 'hi', 'hr', 'hu', 'hy', 'id', 'is', 'it', 'ja', 'ka', 'kk', 'kn', 'ko', 'ky', 'lt', 'lv', 'mi', 'mk', 'mn', 'mr', 'ms', 'mt', 'nb', 'nl', 'ns', 'pa', 'pl', 'pt', 'qu', 'ro', 'ru', 'sa', 'se', 'sk', 'sl', 'sq', 'sv', 'sw', 'ta', 'te', 'th', 'tl', 'tn', 'tr', 'ts', 'tt', 'uk', 'ur', 'uz', 'vi', 'xh', 'zh', 'zu']
	const code = ['af-ZA', 'ar-AE', 'ar-BH', 'ar-DZ', 'ar-EG', 'ar-IQ', 'ar-JO', 'ar-KW', 'ar-LB', 'ar-LY', 'ar-MA', 'ar-OM', 'ar-QA', 'ar-SA', 'ar-SY', 'ar-TN', 'ar-YE', 'az-AZ', 'be-BY', 'bg-BG', 'bs-BA', 'ca-ES', 'cs-CZ', 'cy-GB', 'da-DK', 'de-AT', 'de-CH', 'de-DE', 'de-LI', 'de-LU', 'dv-MV', 'el-GR', 'en-AU', 'en-BZ', 'en-CA', 'en-CB', 'en-GB', 'en-IE', 'en-IN', 'en-JM', 'en-NZ', 'en-PH', 'en-TT', 'en-US', 'en-ZA', 'en-ZW', 'es-AR', 'es-BO', 'es-CL', 'es-CO', 'es-CR', 'es-DO', 'es-EC', 'es-ES', 'es-GT', 'es-HN', 'es-MX', 'es-NI', 'es-PA', 'es-PE', 'es-PR', 'es-PY', 'es-SV', 'es-UY', 'es-VE', 'et-EE', 'eu-ES', 'fa-IR', 'fi-FI', 'fo-FO', 'fr-BE', 'fr-CA', 'fr-CH', 'fr-FR', 'fr-LU', 'fr-MC', 'gl-ES', 'gu-IN', 'he-IL', 'hi-IN', 'hr-BA', 'hr-HR', 'hu-HU', 'hy-AM', 'id-ID', 'is-IS', 'it-CH', 'it-IT', 'ja-JP', 'ka-GE', 'kk-KZ', 'kn-IN', 'ko-KR', 'ky-KG', 'lt-LT', 'lv-LV', 'mi-NZ', 'mk-MK', 'mn-MN', 'mr-IN', 'ms-BN', 'ms-MY', 'mt-MT', 'nb-NO', 'nl-BE', 'nl-NL', 'nn-NO', 'ns-ZA', 'pa-IN', 'pl-PL', 'pt-BR', 'pt-PT', 'qu-BO', 'qu-EC', 'qu-PE', 'ro-RO', 'ru-RU', 'sa-IN', 'se-FI', 'se-NO', 'se-SE', 'sk-SK', 'sl-SI', 'sq-AL', 'sr-BA', 'sr-SP', 'sv-FI', 'sv-SE', 'sw-KE', 'ta-IN', 'ta-LK', 'te-IN', 'th-TH', 'tl-PH', 'tn-ZA', 'tr-TR', 'tt-RU', 'uk-UA', 'ur-PK', 'uz-UZ', 'vi-VN', 'xh-ZA', 'zh-CN', 'zh-HK', 'zh-MO', 'zh-SG', 'zh-TW', 'zu-ZA'];

	const all = [...shortCode, ...code];
	const list = document.getElementById('list');
	const unified = document.getElementById('unified');
	unified.innerHTML = getLanguageUniqueNames('en-US');
	// 初始化时改用 createElement
	for (let i = 0; i < all.length; i++) {
		const div1 = document.createElement('div');
		div1.textContent = all[i];
		div1.onclick = () => changeLanguage(i);
		div1.className = 'hover';

		const div2 = document.createElement('div');
		div2.textContent = getLanguageSelfNames(all[i]);

		const div3 = document.createElement('div');
		div3.textContent = getLanguageUniqueNames(all[i]);

		list.appendChild(div1);
		list.appendChild(div2);
		list.appendChild(div3);
	}
	function changeLanguage(index) {
		uniqueCode = all[index];
		// console.log(uniqueCode);
		unified.innerHTML = getLanguageUniqueNames(uniqueCode, uniqueCode);
		for (let i = 0; i < all.length; i++) {
			list.children[(i + 1) * 3 + 2].innerHTML = getLanguageUniqueNames(all[i], uniqueCode);
		}
	}
</script>

</html>
